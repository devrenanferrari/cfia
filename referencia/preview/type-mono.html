<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Mono / Eyebrow / Kicker</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px 28px; background: #fff; font-family: var(--font-sans); color: #161616; }
  .row { display: flex; align-items: center; gap: 16px; padding: 12px 0; border-bottom: 1px solid #e0e0e0; }
  .row:last-child { border-bottom: none; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: #8d8d8d; width: 160px; flex-shrink: 0; }
  .sample { flex: 1; }
  .eyebrow-pill { display: inline-flex; font-size:14px; font-weight:600; padding: 6px 16px; background:#edf5ff;color:#0043ce;border:1px solid #a6c8ff}
  .kicker { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: #8d8d8d;}
  .step { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; color: #c6c6c6;}
  .mono-date { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color:#525252;}
</style>
</head>
<body>
  <div class="row"><div class="meta">Eyebrow pill</div><div class="sample"><span class="eyebrow-pill">Trilhas de carreira</span></div></div>
  <div class="row"><div class="meta">Kicker · mono 12</div><div class="sample"><span class="kicker">ALUNOS TRABALHANDO EM</span></div></div>
  <div class="row"><div class="meta">Step label · 12/700</div><div class="sample"><span class="step">PASSO 01</span></div></div>
  <div class="row"><div class="meta">Mono date</div><div class="sample"><span class="mono-date">18 · ABR · 2026</span></div></div>
  <div class="row"><div class="meta">Inline code</div><div class="sample"><code style="background:#f4f4f4;padding:2px 6px;font-family:var(--font-mono);font-size:13px">--cds-button-primary</code></div></div>
</body>
</html>
