<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Brand — Logos</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding:0; background: #fff; font-family: var(--font-sans); color: #161616;}
  .grid { display:grid; grid-template-columns: repeat(3,1fr); gap:1px; background:#e0e0e0; border:1px solid #e0e0e0;}
  .cell { padding:22px; min-height:130px; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; gap:12px;}
  .dark { background:#161616;}
  .blue { background:#0f62fe;}
  .wordmark { font-family:var(--font-sans); font-weight:600; letter-spacing:0; line-height:1;}
  .lbl { font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.08em;}
  .lbl.lite { color:#8d8d8d;}
  .lbl.dark { color:#a8a8a8;}
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><span class="wordmark" style="font-size:40px;color:#161616">CFIA</span><span class="lbl lite">PRIMARY · dark on light</span></div>
    <div class="cell dark"><span class="wordmark" style="font-size:40px;color:#fff">CFIA</span><span class="lbl dark">INVERSE · white on gray-100</span></div>
    <div class="cell blue"><span class="wordmark" style="font-size:40px;color:#fff">CFIA</span><span class="lbl" style="color:#d0e2ff">ON-BRAND · white on blue-60</span></div>
    <div class="cell"><span class="wordmark" style="font-size:24px;color:#161616">CFIA</span><span class="lbl lite">SMALL · nav · 18–24px</span></div>
    <div class="cell dark"><span class="wordmark" style="font-size:28px;color:#fff">cfia</span><span class="lbl dark">LOWERCASE · footer only</span></div>
    <div class="cell"><div style="width:48px;height:48px;background:#0f62fe;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:26px">C</div><span class="lbl lite">FAVICON · blue 60 · white C</span></div>
  </div>
</body>
</html>
