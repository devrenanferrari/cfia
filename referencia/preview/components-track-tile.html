<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Components — Track Tile</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--font-sans); color: #161616;}
  .grid { display:grid; grid-template-columns: repeat(4,1fr); gap:1px; background:#e0e0e0; border:1px solid #e0e0e0;}
  .tile { background:#fff; padding:24px 20px; display:flex; flex-direction:column;}
  .tile.hover { background:#f4f4f4;}
  .icon { width:44px; height:44px; background:#edf5ff; display:flex; align-items:center; justify-content:center; margin-bottom:18px;}
  .icon svg { width:22px; height:22px; color:#0f62fe;}
  h3 { font-size:16px; font-weight:700; margin:0 0 6px;}
  p { font-size:12px; color:#525252; line-height:1.5; margin:0 0 18px; flex:1;}
  .dur { display:flex; align-items:center; gap:6px; font-size:12px; color:#525252; margin-bottom:16px;}
  .cta { display:inline-flex; align-items:center; justify-content:center; gap:6px; border:1px solid #0f62fe; color:#0f62fe; padding:8px 12px; font-size:12px; font-weight:600; cursor:pointer;}
  .cta.hover { background:#0f62fe; color:#fff;}
</style>
</head>
<body>
  <div class="grid">
    <div class="tile">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9z"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></svg></div>
      <h3>Engenheiro de IA</h3>
      <p>Construa e coloque modelos em produção</p>
      <div class="dur">⏱ 6–8 meses</div>
      <button class="cta">Ver trilha →</button>
    </div>
    <div class="tile hover">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg></div>
      <h3>Cientista de Dados</h3>
      <p>Transforme dados em decisões inteligentes</p>
      <div class="dur">⏱ 4–6 meses</div>
      <button class="cta hover">Ver trilha →</button>
    </div>
    <div class="tile">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 0-4 4v4a4 4 0 0 0-4 4v4a4 4 0 0 0 4 4h8a4 4 0 0 0 4-4v-4a4 4 0 0 0-4-4V6a4 4 0 0 0-4-4z"/></svg></div>
      <h3>Machine Learning</h3>
      <p>Treine, otimize e escale modelos</p>
      <div class="dur">⏱ 6–8 meses</div>
      <button class="cta">Ver trilha →</button>
    </div>
    <div class="tile">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.5 6.5L21 11l-6.5 2.5L12 20l-2.5-6.5L3 11l6.5-2.5L12 2z"/></svg></div>
      <h3>IA Generativa</h3>
      <p>Crie aplicações modernas com IA</p>
      <div class="dur">⏱ 4–5 meses</div>
      <button class="cta">Ver trilha →</button>
    </div>
  </div>
</body>
</html>
