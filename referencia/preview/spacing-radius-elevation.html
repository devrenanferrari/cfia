<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Radius & Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--font-sans); color: #161616; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .box { width: 96px; height: 64px; background: #edf5ff; border:1px solid #a6c8ff; display:flex; align-items:center; justify-content:center; color:#0043ce; font-weight:600; font-size:13px;}
  .name { font-size: 12px; font-weight: 600; color: #161616; }
  .desc { font-family: var(--font-mono); font-size: 10px; color: #8d8d8d; }
  .label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: #6f6f6f; margin-bottom: 16px; }
</style>
</head>
<body>
  <div class="label">Radius · Carbon = 0, exceptions only</div>
  <div class="grid">
    <div class="item"><div class="box">Default</div><div class="name">radius-0</div><div class="desc">0px · EVERYTHING</div></div>
    <div class="item"><div class="box" style="border-radius:24px">Pill</div><div class="name">radius-pill</div><div class="desc">24px · filters</div></div>
    <div class="item"><div class="box" style="border-radius:9999px;width:56px;height:56px;">✓</div><div class="name">radius-full</div><div class="desc">avatar · dot</div></div>
    <div class="item"><div class="box" style="box-shadow:0 24px 64px rgba(15,98,254,0.12);border:none;background:#fff">Hero</div><div class="name">shadow-hero</div><div class="desc">0 24 64 blue/12</div></div>
    <div class="item"><div class="box" style="box-shadow:0 4px 16px rgba(0,0,0,0.08);border:1px solid #e0e0e0;background:#fff">Badge</div><div class="name">shadow-badge</div><div class="desc">0 4 16 /08</div></div>
  </div>
</body>
</html>
