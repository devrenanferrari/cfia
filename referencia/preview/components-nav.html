<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Components — Nav</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: #f4f4f4; font-family: var(--font-sans); color: #161616;}
  .nav { background: #161616; height:48px; display:flex; align-items:center; padding:0 16px;}
  .logo { color:#fff; font-weight:600; font-size:18px;}
  .links { display:flex; margin-left: 28px; height:100%;}
  .link { color:#c6c6c6; font-size:13px; padding:0 16px; display:flex; align-items:center; position:relative; height:100%;}
  .link.active { color:#fff; font-weight:600;}
  .link.active::after { content:""; position:absolute; left:0; bottom:0; width:100%; height:3px; background:#fff;}
  .right { margin-left:auto; display:flex; align-items:center; gap:8px;}
  .icon { color:#fff; padding: 0 16px; height:48px; display:flex; align-items:center;}
  .cta { background:#0f62fe; color:#fff; font-weight:600; font-size:12px; padding: 6px 14px;}
  .sub { padding:14px 20px; font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#6f6f6f;}
</style>
</head>
<body>
  <div class="nav">
    <div class="logo">CFIA</div>
    <nav class="links">
      <a class="link active" href="#">Cursos</a>
      <a class="link" href="#">Professores</a>
      <a class="link" href="#">Sobre</a>
    </nav>
    <div class="right">
      <div class="icon">🔍</div>
      <button class="cta">Assinar</button>
      <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#0f62fe,#002d9c);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-left:4px">RF</div>
    </div>
  </div>
  <div class="sub">Sticky · 48px · Gray 100 BG · White text · 3px underline on active</div>
</body>
</html>
