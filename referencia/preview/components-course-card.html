<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Components — Course Card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: #f4f4f4; font-family: var(--font-sans); color: #161616;}
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:1px; background:#e0e0e0; border:1px solid #e0e0e0;}
  .card { background:#fff; display:flex; flex-direction:column; transition:background .2s; border-bottom: 2px solid transparent; cursor:pointer;}
  .card.hover { background:#f4f4f4; border-bottom-color:#0f62fe;}
  .thumb { aspect-ratio: 16/9; background: linear-gradient(135deg,#0f62fe,#002d9c); position:relative; display:flex; align-items:center; justify-content:center; color:#a6c8ff; font-family:var(--font-mono); font-size:12px; letter-spacing:.2em;}
  .thumb.alt { background: linear-gradient(135deg,#393939,#161616);}
  .thumb .tag { position:absolute; top:10px; left:10px; font-size:11px; font-weight:600; padding:3px 8px;}
  .content { padding:14px 16px 16px;}
  .cat { display:flex; justify-content:space-between; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:#525252; margin-bottom:6px;}
  .title { font-weight:600; font-size:14px; line-height:1.35; margin-bottom:4px;}
  .instructor { font-size:12px; color:#525252; margin-bottom:10px;}
  .rating { display:flex; gap:4px; align-items:center; font-size:12px; margin-bottom:10px;}
  .stars { color:#f1c21b; letter-spacing:1px;}
  .count { color:#8d8d8d; font-size:11px;}
  .foot { display:flex; justify-content:space-between; padding-top:10px; border-top:1px solid #e0e0e0; font-size:13px;}
  .price { font-weight:600;}
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="thumb"><span class="tag" style="background:#24a148;color:#fff">Grátis</span>ML · BÁSICO</div>
      <div class="content">
        <div class="cat"><span>MACHINE LEARNING</span><span>INICIANTE</span></div>
        <div class="title">Fundamentos de Machine Learning com Python</div>
        <div class="instructor">Prof. Ana Ribeiro</div>
        <div class="rating"><span class="stars">★★★★★</span><b>4,9</b><span class="count">(1.284 alunos)</span></div>
        <div class="foot"><span style="color:#525252">👥 1.284</span><span class="price">Acesso livre</span></div>
      </div>
    </div>
    <div class="card hover">
      <div class="thumb alt"><span class="tag" style="background:#161616;color:#fff">🔒 Premium</span>IA GENERATIVA</div>
      <div class="content">
        <div class="cat"><span>IA GENERATIVA</span><span>AVANÇADO</span></div>
        <div class="title">Construindo agentes com LLMs em produção</div>
        <div class="instructor">Prof. Lucas Moura</div>
        <div class="rating"><span class="stars">★★★★★</span><b>4,8</b><span class="count">(487 alunos)</span></div>
        <div class="foot"><span style="color:#525252">👥 487</span><span class="price">R$ 299</span></div>
      </div>
    </div>
  </div>
</body>
</html>
