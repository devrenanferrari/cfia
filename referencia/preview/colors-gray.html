<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Colors — Gray</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--font-sans); color: var(--fg); }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 1px; background: #e0e0e0; border: 1px solid #e0e0e0; }
  .sw { aspect-ratio: 1/1.1; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; font-size: 10px; line-height: 1.3; }
  .sw .name { font-weight: 600; }
  .sw .hex { font-family: var(--font-mono); opacity: .9; }
  .label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: #6f6f6f; margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="label">Gray — Neutrals</div>
  <div class="row">
    <div class="sw" style="background:#f4f4f4;color:#161616"><div class="name">10</div><div class="hex">f4f4f4</div></div>
    <div class="sw" style="background:#e0e0e0;color:#161616"><div class="name">20</div><div class="hex">e0e0e0</div></div>
    <div class="sw" style="background:#c6c6c6;color:#161616"><div class="name">30</div><div class="hex">c6c6c6</div></div>
    <div class="sw" style="background:#a8a8a8;color:#161616"><div class="name">40</div><div class="hex">a8a8a8</div></div>
    <div class="sw" style="background:#8d8d8d;color:#fff"><div class="name">50</div><div class="hex">8d8d8d</div></div>
    <div class="sw" style="background:#6f6f6f;color:#fff"><div class="name">60</div><div class="hex">6f6f6f</div></div>
    <div class="sw" style="background:#525252;color:#fff"><div class="name">70 ★</div><div class="hex">525252</div></div>
    <div class="sw" style="background:#393939;color:#fff"><div class="name">80</div><div class="hex">393939</div></div>
    <div class="sw" style="background:#262626;color:#fff"><div class="name">90</div><div class="hex">262626</div></div>
    <div class="sw" style="background:#161616;color:#fff"><div class="name">100 ★</div><div class="hex">161616</div></div>
  </div>
</body>
</html>
