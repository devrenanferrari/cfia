<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Colors — Primary Blue</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--font-sans); color: var(--fg); }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 1px; background: #e0e0e0; border: 1px solid #e0e0e0; }
  .sw { aspect-ratio: 1/1.1; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; font-size: 10px; line-height: 1.3; }
  .sw .name { font-weight: 600; }
  .sw .hex { font-family: var(--font-mono); opacity: .9; }
  .label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: #6f6f6f; margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="label">Blue — Primary / Interactive</div>
  <div class="row">
    <div class="sw" style="background:#edf5ff;color:#161616"><div class="name">10</div><div class="hex">edf5ff</div></div>
    <div class="sw" style="background:#d0e2ff;color:#161616"><div class="name">20</div><div class="hex">d0e2ff</div></div>
    <div class="sw" style="background:#a6c8ff;color:#161616"><div class="name">30</div><div class="hex">a6c8ff</div></div>
    <div class="sw" style="background:#78a9ff;color:#161616"><div class="name">40</div><div class="hex">78a9ff</div></div>
    <div class="sw" style="background:#4589ff;color:#fff"><div class="name">50</div><div class="hex">4589ff</div></div>
    <div class="sw" style="background:#0f62fe;color:#fff"><div class="name">60 ★</div><div class="hex">0f62fe</div></div>
    <div class="sw" style="background:#0043ce;color:#fff"><div class="name">70</div><div class="hex">0043ce</div></div>
    <div class="sw" style="background:#002d9c;color:#fff"><div class="name">80</div><div class="hex">002d9c</div></div>
    <div class="sw" style="background:#001d6c;color:#fff"><div class="name">90</div><div class="hex">001d6c</div></div>
    <div class="sw" style="background:#001141;color:#fff"><div class="name">100</div><div class="hex">001141</div></div>
  </div>
</body>
</html>
